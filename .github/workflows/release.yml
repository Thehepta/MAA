name: Build and Release DelphiHelper

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Update ida-plugin.json version
        run: |
          echo "Updating version to $VERSION"

          jq --arg v "$VERSION" \
            '.plugin.version = $v' \
            ida-plugin.json > tmp.json

          mv tmp.json ida-plugin.json

      - name: Create release zip
        run: |
          zip -r DelphiHelper-${VERSION}.zip \
            ida-plugin.json \
            *.py \
            IDR_KB/ \
            README.md \
            LICENSE

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: DelphiHelper-${{ env.VERSION }}.zip