name: Release MMA Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare release directory
        run: |
          mkdir -p release

      - name: Copy project files
        run: |
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            ./ release/

      - name: Update ida-plugin.json version (in release only)
        run: |
          jq ".plugin.version = \"${{ env.VERSION }}\"" \
            release/ida-plugin.json > release/ida-plugin.json.tmp
          mv release/ida-plugin.json.tmp release/ida-plugin.json

      - name: Create zip archive
        run: |
          cd release
          zip -r ../MMA-${{ env.VERSION }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MMA v${{ env.VERSION }}
          files: MMA-${{ env.VERSION }}.zip