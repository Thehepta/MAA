name: Release MMA Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update plugin.json version
        run: |
          jq ".plugin.version = \"${{ env.VERSION }}\"" plugin.json > tmp.json
          mv tmp.json plugin.json

      - name: Commit updated plugin.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add plugin.json
          git commit -m "chore: bump version to ${{ env.VERSION }}" || echo "No changes"

      - name: Push changes
        run: git push origin HEAD:main

      - name: Create zip
        run: |
          ZIP=MMA-${{ env.VERSION }}.zip
          git archive --format=zip --output=$ZIP HEAD

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MMA v${{ env.VERSION }}
          files: ${{ env.ZIP }}